name: debug-env
description: Real-world debugging environment for backend/system failures
version: 1.0.0

entrypoint: server.app:main

tasks:
  - api_latency
  - auth_token_expired
  - invalid_token
  - auth_service_down
  - rate_limit_auth
  - slow_query
  - connection_pool_exhausted
  - database_down
  - disk_full
  - stale_cache_issue
  - cache_miss_issue
  - cache_down
  - queue_backlog
  - consumer_down
  - message_loss
  - uneven_routing
  - lb_down
  - auth_db_combined_issue
  - cache_queue_dependency
  - full_system_failure

observation_space:
  type: object
  properties:
    error:
      type: string
    logs:
      type: string
    metrics:
      type: object

action_space:
  type: string
  description: Action string like check_logs, check_db, fix_db, etc.

reward_range: [-10, 30]

max_steps: 10

grader:
  type: endpoint
  endpoint: /grade